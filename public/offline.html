<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sense connexió · Piscina Comunitària</title>
    <link rel="icon" href="/icons/icon-192.png" />
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #eef9ff 0%, #d9f1ff 100%);
        color: #184a8c;
      }
      img {
        width: 96px;
        height: 96px;
      }
      h1 {
        font-size: 1.4rem;
        margin: 0;
      }
      p {
        margin: 0;
        max-width: 22rem;
        color: #1655b2;
      }
      button {
        margin-top: 0.5rem;
        border: none;
        border-radius: 0.6rem;
        background: #1682f0;
        color: #fff;
        font-size: 1rem;
        font-weight: 600;
        padding: 0.7rem 1.4rem;
        cursor: pointer;
      }
      button:hover {
        background: #1369dc;
      }
    </style>
  </head>
  <body>
    <img src="/icons/icon-192.png" alt="Piscina Comunitària" />
    <h1>Sense connexió</h1>
    <p>
      Sembla que ara mateix no tens connexió a internet. Comprova la xarxa i
      torna-ho a provar.
    </p>
    <button onclick="location.reload()">Tornar a provar</button>
  </body>
</html>
